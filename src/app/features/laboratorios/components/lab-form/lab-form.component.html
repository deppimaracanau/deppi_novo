<div class="container" style="padding-top: 120px; padding-bottom: 50px;">
  <a [routerLink]="['/laboratorios', labId]" style="color: var(--color-primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
    <span>&larr;</span> Voltar para Laboratório
  </a>

  <div class="surface reveal-up">
    <h1 class="font-display">Editar Laboratório</h1>
    
    <ng-container *ngIf="loading">
      <div style="text-align: center; padding: 3rem;">Carregando dados...</div>
    </ng-container>

    <form *ngIf="!loading" [formGroup]="labForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nome do Laboratório</label>
        <input type="text" formControlName="name" style="width: 100%;">
      </div>
      
      <div class="form-group">
        <label>Descrição</label>
        <textarea formControlName="description" rows="4" style="width: 100%;"></textarea>
      </div>

      <hr style="border: none; border-top: 1px solid var(--color-border); margin: 2rem 0;">
      
      <h3 class="font-display">Produções</h3>
      <div formArrayName="productions">
        <div *ngFor="let prod of productions.controls; let i=index" [formGroupName]="i" class="glass" style="padding: 1rem; margin-bottom: 1rem; border-radius: 8px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <b>Produção {{i + 1}}</b>
            <button type="button" (click)="removeProduction(i)" class="btn btn-glass" style="padding: 0.3rem 0.6rem; color: #ff4d4f;">Remover</button>
          </div>
          <div class="innovative-grid">
            <div class="form-group"><label>Título</label><input type="text" formControlName="title" style="width: 100%;"></div>
            <div class="form-group"><label>Tipo (Artigo, TCC, etc)</label><input type="text" formControlName="type" style="width: 100%;"></div>
            <div class="form-group"><label>Ano</label><input type="text" formControlName="year" style="width: 100%;"></div>
            <div class="form-group"><label>Link</label><input type="text" formControlName="link" style="width: 100%;"></div>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-glass" (click)="addProduction()" style="margin-bottom: 2rem;">+ Adicionar Produção</button>

      <hr style="border: none; border-top: 1px solid var(--color-border); margin: 2rem 0;">
      
      <h3 class="font-display">Serviços</h3>
      <div formArrayName="services">
        <div *ngFor="let serv of services.controls; let i=index" [formGroupName]="i" class="glass" style="padding: 1rem; margin-bottom: 1rem; border-radius: 8px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <b>Serviço {{i + 1}}</b>
            <button type="button" (click)="removeService(i)" class="btn btn-glass" style="padding: 0.3rem 0.6rem; color: #ff4d4f;">Remover</button>
          </div>
          <div class="innovative-grid">
            <div class="form-group"><label>Nome do Serviço</label><input type="text" formControlName="name" style="width: 100%;"></div>
            <div class="form-group"><label>Tipo</label><input type="text" formControlName="type" style="width: 100%;"></div>
          </div>
          <div class="form-group"><label>Descrição do Serviço</label><textarea formControlName="description" rows="2" style="width: 100%;"></textarea></div>
        </div>
      </div>
      <button type="button" class="btn btn-glass" (click)="addService()" style="margin-bottom: 2rem;">+ Adicionar Serviço</button>

      <div style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
        <a [routerLink]="['/laboratorios', labId]" class="btn btn-glass">Cancelar</a>
        <button type="submit" class="btn btn-primary" [disabled]="saving || labForm.invalid">
          {{ saving ? 'Salvando...' : 'Salvar Laboratório' }}
        </button>
      </div>
    </form>
  </div>
</div>
