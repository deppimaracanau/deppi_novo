<div class="container" style="padding-top: 120px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 class="font-display">Vitrine Tecnológica: Laboratórios</h1>
  </div>
  
  <ng-container *ngIf="loading">
    <div style="text-align: center; padding: 3rem;">Carregando laboratórios...</div>
  </ng-container>

  <div class="innovative-grid" *ngIf="!loading">
    <div class="glass-card reveal-up" *ngFor="let lab of laboratorios">
      <h3 style="margin-bottom: 0.5rem;">{{ lab.name }}</h3>
      <p style="font-size: 0.9rem; margin-bottom: 1.5rem;">{{ lab.description }}</p>
      
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <a [routerLink]="['/laboratorios', lab.id]" class="btn btn-primary" style="font-size: 0.8rem; padding: 0.5rem 1rem;">
          Ver Detalhes
        </a>
        <a *ngIf="isAdmin$ | async" [routerLink]="['/laboratorios', lab.id, 'editar']" class="btn btn-glass" style="font-size: 0.8rem; padding: 0.5rem 1rem;">
          Editar
        </a>
      </div>
    </div>
  </div>
  
  <div *ngIf="!loading && laboratorios.length === 0" style="text-align: center; padding: 3rem;">
    <p>Nenhum laboratório cadastrado.</p>
  </div>
</div>
