name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Build application
        run: npm run build:prod

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deppi_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./backend
    env:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deppi_test
      JWT_SECRET: "test-secret-for-ci-cd-pipeline-validation"
      JWT_REFRESH_SECRET: "test-refresh-secret-for-ci-cd-pipeline"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Build application
        run: npm run build

      - name: Setup test database
        run: |
          npm run migrate
          npm run seed
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

      - name: Run unit tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Permissão fundamental para o upload-sarif funcionar
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0" # Mantém em 0 para não travar o build inteiro só por achar vulnerabilidade

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-vulnerability-scanner"

  # Build and Push Docker Images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging (Local Runner)
        run: |
          cd /home/deppi/deppi_novo
          docker compose pull
          docker compose up -d --remove-orphans
          docker system prune -f

      - name: Run health check
        run: |
          sleep 30
          URL="${{ secrets.STAGING_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          curl -f "$URL/health" || curl -f "$URL/api/health" || exit 1

      - name: Notify Slack
        uses: 8398a7/action-slack@v3.16.2
        with:
          status: ${{ job.status }}
          channel: "#deployments"
          text: "🚀 Deploy to staging completed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Compose (Self-hosted)
        run: |
          if ! docker compose version > /dev/null 2>&1; then
            echo "Docker Compose not found. Installing plugin..."
            mkdir -p ~/.docker/cli-plugins/
            curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
          fi
          docker compose version

      - name: Deploy to production (Local Runner)
        run: |
          # Add local plugins to PATH
          export PATH=$PATH:$HOME/.docker/cli-plugins

          cd /home/deppi/deppi_novo
          # Clean up any ghost submodules or local git mess
          find . -name ".git" -not -path "./.git" -exec rm -rf {} +
          git pull upstream main || git pull origin main
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans

          echo "Checking container status..."
          docker compose ps

      - name: Run health check
        run: |
          export PATH=$PATH:$HOME/.docker/cli-plugins
          URL="${{ secrets.PRODUCTION_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          echo "Testing health at: $URL"

          # Try for up to 60 seconds (12 attempts of 5s)
          for i in {1..12}; do
            if curl -sf "$URL/health" || curl -sf "$URL/api/health"; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            echo "Waiting for service... ($i/12)"
            sleep 5
          done

          echo "❌ Health check failed after 60s"
          cd /home/deppi/deppi_novo
          docker compose logs --tail=50
          exit 1

      - name: Run smoke tests
        run: |
          URL="${{ secrets.PRODUCTION_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          curl -f "$URL/api"
          curl -f "$URL/"

      - name: Notify Slack
        uses: 8398a7/action-slack@v3.16.2
        with:
          status: ${{ job.status }}
          channel: "#deployments"
          text: "🎉 Deploy to production completed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run performance tests
        run: |
          artillery run performance-test-config.yml --target ${{ secrets.STAGING_URL }}

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: artillery-report.html
