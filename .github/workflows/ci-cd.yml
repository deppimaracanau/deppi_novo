name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Apply Prettier formatting
        run: npm run format

      - name: Run Prettier check
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Build application
        run: |
          # 1. Remova a pasta dist antiga para não ter lixo
          rm -rf dist/
          # 2. Instale as dependências garantindo compatibilidade (importante o legacy-peer-deps)
          npm install --legacy-peer-deps
          # 3. Rode o build passando o parâmetro de produção e forçando o service worker
          npx ng build --configuration production --service-worker=true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deppi_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./backend
    env:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deppi_test
      JWT_SECRET: "test-secret-for-ci-cd-pipeline-validation"
      JWT_REFRESH_SECRET: "test-refresh-secret-for-ci-cd-pipeline"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Apply Prettier formatting
        run: npm run format

      - name: Run Prettier check
        run: npm run format:check

      - name: Build application
        run: npm run build

      - name: Setup test database
        run: |
          npm run migrate
          npm run seed
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

      - name: Run unit tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deppi_test
          REDIS_URL: redis://localhost:6379

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Permissão fundamental para o upload-sarif funcionar
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0" # Mantém em 0 para não travar o build inteiro só por achar vulnerabilidade

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-vulnerability-scanner"

  # Build and Push Docker Images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          # Banco de Dados
          echo "DB_USER=deppi" > .env
          echo "DB_NAME=deppi" >> .env
          echo "DB_HOST=postgres" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DATABASE_URL=postgresql://deppi:d3pp1%402026@postgres:5432/deppi" >> .env
          echo "POSTGRES_USER=deppi" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "POSTGRES_DB=deppi" >> .env

          # Redis
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env

          # Autenticação
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
          echo "JWT_EXPIRES_IN=7d" >> .env
          echo "JWT_REFRESH_EXPIRES_IN=30d" >> .env
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> .env

          # E-mail (SMTP)
          echo "SMTP_HOST=smtp.gmail.com" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_FROM_NAME=DEPPI IFCE Maracanaú" >> .env

          # Infra/Rede
          echo "CORS_ORIGIN=http://10.50.12.19:4200" >> .env
          echo "FRONTEND_URL=http://10.50.12.19:4200" >> .env
          echo "API_URL=http://10.50.12.19:3000" >> .env
          echo "NODE_ENV=production" >> .env

          # Monitoramento
          echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env
          echo "PROMETHEUS_PASSWORD=${{ secrets.PROMETHEUS_PASSWORD }}" >> .env

      - name: Deploy to staging (Local Runner)
        run: |
          cd /home/deppi/deppi_novo
          echo "Forcefully freeing ports 3000 and 4000..."
          sudo fuser -k 3000/tcp || true
          sudo fuser -k 4000/tcp || true
          sleep 2 # Give a moment for the port to be released
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans
          docker system prune -f

      - name: Run health check
        run: |
          URL="${{ secrets.STAGING_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          echo "Testing health at: $URL"
          for i in {1..24}; do
            if curl -sf "$URL/health" || curl -sf "$URL/api/health"; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            echo "Waiting for service... ($i/24)"
            sleep 5
          done
          echo "❌ Health check failed after 120s"
          exit 1

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cd /home/deppi/deppi_novo
          # Banco de Dados
          echo "DB_USER=deppi" > .env
          echo "DB_NAME=deppi" >> .env
          echo "DB_HOST=postgres" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DATABASE_URL=postgresql://deppi:${{ secrets.DB_PASSWORD }}@postgres:5432/deppi" >> .env
          echo "POSTGRES_USER=deppi" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "POSTGRES_DB=deppi" >> .env

          # Redis
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env

          # Autenticação
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
          echo "JWT_EXPIRES_IN=7d" >> .env
          echo "JWT_REFRESH_EXPIRES_IN=30d" >> .env
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> .env

          # E-mail (SMTP)
          echo "SMTP_HOST=smtp.gmail.com" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_FROM_NAME=DEPPI IFCE Maracanaú" >> .env

          # Infra/Rede
          echo "CORS_ORIGIN=https://deppi.maracanau.ifce.edu.br" >> .env
          echo "FRONTEND_URL=https://deppi.maracanau.ifce.edu.br" >> .env
          echo "API_URL=https://deppi.maracanau.ifce.edu.br/api" >> .env
          echo "NODE_ENV=production" >> .env

          # Monitoramento
          echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env
          echo "PROMETHEUS_PASSWORD=${{ secrets.PROMETHEUS_PASSWORD }}" >> .env

      - name: Setup Docker Compose (Self-hosted)
        run: |
          if ! docker compose version > /dev/null 2>&1; then
            echo "Docker Compose not found. Installing plugin..."
            mkdir -p ~/.docker/cli-plugins/
            curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
          fi
          export PATH=$PATH:$HOME/.docker/cli-plugins

          cd /home/deppi/deppi_novo
          # Evita conflitos com caminhos longos ou links simbólicos
          git config core.protectNTFS false || true
          git config core.protectHFS false || true
          git config core.symlinks true || true

          echo "🔄 Buscando atualizações do servidor..."
          git fetch --all
          
          echo "🗑️ Forçando reset para origin/main..."
          git reset --hard origin/main

          # Remove diretórios criados pelo Docker com dono root (ex: database/init)
          # que o git clean não consegue remover sem sudo
          sudo rm -rf database/init 2>/dev/null || true

          # Limpeza profunda, mas mantendo o .env que acabamos de criar
          # (o runner fica em ~/actions-runner fora do repo, não precisa de -e)
          git clean -fd -e .env

          # Restaura permissão de execução no runner (caminho real fora do repo)
          chmod +x /home/deppi/actions-runner/runsvc.sh 2>/dev/null || true
          chmod +x /home/deppi/actions-runner/run.sh 2>/dev/null || true

          echo "Forcefully freeing ports 3000 and 4000..."
          sudo fuser -k 3000/tcp || true
          sudo fuser -k 4000/tcp || true
          sleep 2

          # Force pull and recreate
          docker compose pull app
          docker compose up -d --force-recreate --remove-orphans app

          echo "Container Status:"
          docker compose ps

      - name: Run health check
        run: |
          export PATH=$PATH:$HOME/.docker/cli-plugins
          URL="${{ secrets.PRODUCTION_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          echo "Testing health at: $URL"

          # Try for up to 120 seconds (24 attempts of 5s)
          for i in {1..24}; do
            if curl -sf "$URL/health" || curl -sf "$URL/api/health"; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            echo "Waiting for service... ($i/24)"
            sleep 5
          done

          echo "❌ Health check failed after 120s"
          cd /home/deppi/deppi_novo
          echo "--- APP LOGS ---"
          docker compose logs app --tail=100
          echo "--- ALL LOGS ---"
          docker compose logs --tail=20
          exit 1

      - name: Run smoke tests
        run: |
          URL="${{ secrets.PRODUCTION_URL }}"
          [ -z "$URL" ] && URL="http://localhost:4000"
          curl -f "$URL/api"
          curl -f "$URL/"

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run performance tests
        run: |
          artillery run performance-test-config.yml --target ${{ secrets.STAGING_URL }}

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: artillery-report.html
